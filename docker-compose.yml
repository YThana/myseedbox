services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: seedbox-qbittorrent
    environment:
      - PUID=501
      - PGID=20
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ./data/qbittorrent-config:/config
      - ./data/downloads:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./mySeedBoxBE
    container_name: seedbox-backend
    env_file:
      - path: ./mySeedBoxBE/.env
        required: false
    environment:
      - QBIT_URL=http://qbittorrent:8080
      - DOWNLOADS_DIR=/downloads
    volumes:
      - ./data/downloads:/downloads
    ports:
      - "8000:8000"
    depends_on:
      qbittorrent:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./mySeedBoxFE
    container_name: seedbox-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
