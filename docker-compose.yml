services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: seedbox-qbittorrent
    environment:
      - PUID=501
      - PGID=20
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ./data/qbittorrent-config:/config
      - ./data/downloads:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
